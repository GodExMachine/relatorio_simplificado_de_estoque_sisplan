<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Redirecionando...</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.12);
      text-align: center;
      max-width: 500px;
    }

    h1 {
      color: #0078d7;
      margin-bottom: 10px;
    }

    #contador {
      font-size: 32px;
      font-weight: bold;
      color: #ff6600;
      margin: 20px 0;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      margin: 15px 0;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 20px;
      background: #0078d7;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }

    a:hover {
      background: #005fa3;
    }

    .aviso {
      margin-top: 25px;
      font-size: 22px;
      font-weight: bold;
      color: #d62828;
    }
  </style>
</head>
<body>


<div class="box">
  <h1>Iniciado o relatório</h1>

  <p>Você será redirecionado automaticamente em:</p>

  <div id="contador">10</div>

  <div class="aviso">
    Caso não abrir, entre em contato com o Alex.
  </div>

  <a id="link" href="#">Ir imediatamente</a>
</div>

<script>
  const IP = "http:SEU_IP_AQUI:3030";

  let tempo = 10;

  const contador = document.getElementById("contador");
  const link = document.getElementById("link");

  
  link.href = IP;

  const interval = setInterval(() => {
    tempo--;
    contador.textContent = tempo;

    if (tempo <= 0) {
      clearInterval(interval);
      window.location.href = IP;
    }
  }, 1000);
</script>

</body>
</html>
